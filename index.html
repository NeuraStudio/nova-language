    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* 🔵 Apple-Style Glassmorphism Navbar 🔵 */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-logo { display: flex; align-items: center; font-weight: 900; font-size: 22px; color: #fff; text-decoration: none; letter-spacing: -0.5px;}
        .premium-logo { width: 40px; height: 40px; border-radius: 50%; box-shadow: 0 0 20px rgba(0, 207, 255, 0.6); border: 2px solid #00CFFF; object-fit: cover; margin-right: 12px; }
        .nav-links a { margin: 0 15px; text-decoration: none; color: #aaa; font-weight: 600; transition: 0.3s;}
        .nav-links a:hover { color: #fff; }
        .btn { background: #00CFFF; color: #000; padding: 10px 24px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: transform 0.2s;}
        .btn:hover { transform: scale(1.05); }

        /* Premium Fade-In Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .hero { text-align: center; padding: 80px 20px 0; animation: fadeInUp 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
        h1.title { font-size: 5.5em; font-weight: 900; letter-spacing: -3px; margin-bottom: 20px; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        
        .image-row { display: flex; justify-content: center; gap: 20px; max-width: 1000px; margin: 50px auto; animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .image-row img { border-radius: 16px; object-fit: cover; border: 1px solid #333; transition: 0.4s;}
        .image-row img:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(0,207,255,0.3);}
        .img-1 { width: 300px; height: 200px; } .img-2 { width: 400px; height: 250px; z-index: 10; transform: scale(1.05); } .img-3 { width: 300px; height: 200px; }
    </style>
</head>
