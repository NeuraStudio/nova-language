<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    <defs>
        <!-- 3D Glowing Core -->
        <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="15%" stop-color="#2D7FFF"/>
            <stop offset="70%" stop-color="#002266"/>
            <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
        
        <!-- Orbit Gradients from your JSON -->
        <linearGradient id="orbit1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00CFFF"/>
            <stop offset="50%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#6A5CFF"/>
        </linearGradient>
        <linearGradient id="orbit2" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7B2CFF"/>
            <stop offset="50%" stop-color="#A855F7"/>
            <stop offset="100%" stop-color="#4F46E5"/>
        </linearGradient>

        <!-- Neura Studio Text Gradient -->
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00CFFF"/>
            <stop offset="100%" stop-color="#7B2CFF"/>
        </linearGradient>

        <!-- Bloom/Glow Effect (Glass reflection) -->
        <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="500" height="500" fill="#000000" rx="40"/>

    <!-- Cosmic Neural Orbit -->
    <g transform="translate(250, 210)">
        <ellipse cx="0" cy="0" rx="130" ry="35" fill="none" stroke="url(#orbit1)" stroke-width="18" transform="rotate(-35)" filter="url(#bloom)"/>
        <ellipse cx="0" cy="0" rx="130" ry="35" fill="none" stroke="url(#orbit2)" stroke-width="18" transform="rotate(35)" filter="url(#bloom)"/>
        <ellipse cx="0" cy="0" rx="90" ry="20" fill="none" stroke="#00CFFF" stroke-width="8" transform="rotate(-10)"/>
        
        <circle cx="0" cy="0" r="45" fill="url(#coreGlow)" filter="url(#bloom)"/>
        
        <!-- Shining Star inside Core -->
        <path d="M 0 -20 L 3 -6 L 17 -3 L 3 0 L 0 14 L -3 0 L -17 -3 L -3 -6 Z" fill="#ffffff" filter="url(#bloom)"/>
    </g>

    <!-- Text Layer (Neura Studio) -->
    <text x="85" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Neura</text>
    <text x="245" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="url(#textGrad)" letter-spacing="-1">Studio</text>
    <text x="415" y="375" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">TM</text>
</svg>
