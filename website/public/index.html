<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neura Studio | Nova</title>
    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: -apple-system, sans-serif; margin: 0; transition: 0.5s; }
        #preloader { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .fade-in { animation: fadeInUp 1s forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Web IDE / CMD STYLING */
        .ide-container { background: #f0f0f0; padding: 20px; border-radius: 10px; width: 80%; margin: 50px auto; border: 1px solid #ddd; }
        #terminal { background: #000; color: #0f0; padding: 20px; height: 300px; overflow-y: auto; font-family: monospace; border-radius: 5px; }
        #input-line { display: flex; color: #0f0; margin-top: 10px; }
        #cmd-input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-family: monospace; }
        
        .navbar { display: flex; justify-content: space-between; padding: 20px 50px; background: #fff; border-bottom: 1px solid #eee; }
        .btn-download { background: #0a84ff; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>
    <div id="preloader"><img src="neura-logo.svg" width="100"><p>Loading Apex Engine...</p></div>

    <div class="fade-in">
        <nav class="navbar">
            <div class="nav-logo"><strong>NEURA STUDIO</strong></div>
            <a href="#" class="btn-download">Download Nova</a>
        </nav>

        <div class="ide-container">
            <h2>Nova Web IDE (Apex Core)</h2>
            <div id="terminal">
                <div>> NeuraVM Ready. Waiting for input...</div>
            </div>
            <div id="input-line">
                <span>nova>>>&nbsp;</span>
                <input type="text" id="cmd-input" autofocus>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => setTimeout(() => document.getElementById('preloader').style.display='none', 1500);
        
        const input = document.getElementById('cmd-input');
        const terminal = document.getElementById('terminal');
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const cmd = input.value;
                terminal.innerHTML += `<div>> ${cmd}</div>`;
                if(cmd.includes("run")) terminal.innerHTML += `<div style="color:cyan">🔥 Compiling... Success (0.01ms)</div>`;
                else terminal.innerHTML += `<div>Output: Command '${cmd}' executed.</div>`;
                input.value = '';
                terminal.scrollTop = terminal.scrollHeight;
            }
        });
    </script>
</body>
</html>
