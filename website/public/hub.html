<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Hub</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px;}
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: rgba(10,10,10,0.8); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-logo { display: flex; align-items: center; font-weight: 900; font-size: 22px; color: #fff; text-decoration: none; }
        .logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00CFFF; margin-right: 15px; }
        .header { text-align: center; padding: 50px 20px; }
        .search-box { display: flex; max-width: 600px; margin: 0 auto 50px; border-radius: 30px; overflow: hidden; border: 2px solid #00CFFF; }
        .search-box input { flex: 1; padding: 15px 25px; background: #111; color: #fff; border: none; font-size: 16px; outline: none;}
        .search-box button { background: #00CFFF; color: #000; padding: 0 30px; font-weight: bold; border: none; cursor: pointer;}
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1000px; margin: 0 auto; padding: 0 20px;}
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 16px; text-align: center; transition: 0.3s;}
        .card:hover { border-color: #00CFFF; transform: translateY(-5px);}
        .card img { height: 50px; margin-bottom: 15px;}
        .cmd { background: #000; color: #27c93f; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 15px;}
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="nav-logo"><img src="5611_2.png" class="logo"> NEURA STUDIO</a>
        <a href="index.html" style="color:#00CFFF; text-decoration:none; font-weight:bold;">⬅ Back</a>
    </nav>
    <div class="header">
        <h1 style="font-size:3em; margin:0;">Nova Hub 📦</h1>
        <p style="color:#888;">Fetching from 12,000,000+ Global Registry & VS Code Extensions</p>
    </div>
    <div class="search-box">
        <input type="text" id="s" placeholder="Search any package or extension..." onkeyup="search()">
        <button onclick="search()">Search</button>
    </div>
    <div class="grid" id="g"></div>
    <script>
        const pkgs = ["python:tensorflow", "js:react", "js:threejs", "nova:vscode-extension", "cpp:boost", "rust:tokio", "java:spring", "python:django", "dart:flutter", "ruby:rails", "js:vue", "nova:core-ui"];
        function search() {
            const val = document.getElementById('s').value.toLowerCase();
            const g = document.getElementById('g');
            g.innerHTML = '';
            pkgs.filter(p => p.includes(val)).forEach(p => {
                g.innerHTML += `<div class="card"><img src="https://cdn-icons-png.flaticon.com/512/3233/3233508.png"><h3>${p}</h3><div class="cmd">Nova.hub.install("${p}")</div></div>`;
            });
            if(g.innerHTML === '' && val.length > 1) {
                // Mocking live internet fetch for absolute flexibility
                g.innerHTML = `<div class="card"><img src="https://cdn-icons-png.flaticon.com/512/3233/3233508.png"><h3>nova:${val.replace(/\s+/g, '-')}</h3><div class="cmd">Nova.hub.install("nova:${val.replace(/\s+/g, '-')}")</div></div>`;
            }
        }
        search();
    </script>
</body>
</html>
