<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMD - Execute Nova</title>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Courier New', monospace; margin: 0; padding: 20px;}
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px;}
        .header h1 { margin: 0; color: #00CFFF; font-size: 24px;}
        .btn-run { background: #27c93f; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;}
        .editor-split { display: flex; gap: 20px; height: 80vh;}
        textarea { width: 50%; background: #1e293b; color: #a3e635; padding: 20px; border: 1px solid #333; border-radius: 8px; font-family: inherit; font-size: 16px; outline: none; resize: none;}
        .output { width: 50%; background: #000; color: #fff; padding: 20px; border: 1px solid #333; border-radius: 8px; overflow-y: auto;}
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Nova Command Line Interface (CLI)</h1>
        <div>
            <a href="index.html" style="color:#fff; margin-right:20px; text-decoration:none;">⬅ Home</a>
            <button class="btn-run" onclick="executeNova()">▶ Run Code</button>
        </div>
    </div>
    <div class="editor-split">
<textarea id="code-input" spellcheck="false">
// Write Nova Syntax Here
Nova.show("Running native execution...")
Nova.hardware.cpu.alloc(16, "threads")
</textarea>
        <div id="output" class="output">Waiting for execution...</div>
    </div>

    <script>
        function executeNova() {
            let code = document.getElementById('code-input').value;
            let out = document.getElementById('output');
            out.innerHTML = "<span style='color:#64748b;'>Compiling...</span><br><br>";
            
            let hasError = false;
            let lines = code.split('\n');
            lines.forEach((line, index) => {
                line = line.trim();
                if(line === "" || line.startsWith("//")) return;

                if(line.includes('Nova.show(')) {
                    let match = line.match(/\((.*?)\)/);
                    if(match) out.innerHTML += `> ${match[1].replace(/['"]/g, '')}<br>`;
                } else if(line.includes('Nova.hardware.cpu.alloc')) {
                    out.innerHTML += `> [System] Hardware threads allocated successfully.<br>`;
                } else if(line.includes('Nova.')) {
                    out.innerHTML += `> [Exec] ${line} executed.<br>`;
                } else {
                    out.innerHTML += `<span class='error'>Line ${index+1}: SyntaxError: Unrecognized command '${line}'. Ensure you use standard Nova syntax.</span><br>`;
                    hasError = true;
                }
            });
            out.innerHTML += `<br><span style='color:#00CFFF;'>Execution finished in ${hasError ? '5.2ms' : '0.01ms'}</span>`;
        }
    </script>
</body>
</html>
