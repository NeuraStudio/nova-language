<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Nova</title>
    <style>
        body { background: #000; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff;}
        .nav { position: fixed; top: 0; left: 0; width: 100%; display: flex; align-items: center; padding: 15px 50px; background: rgba(20,20,20,0.9); z-index: 100; box-sizing: border-box; }
        .nav-logo { display: flex; align-items: center; font-weight: 900; font-size: 22px; color: #fff; text-decoration: none;}
        .premium-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #00CFFF; object-fit: cover; margin-right: 12px; }
        
        .box { background: #111; width: 750px; padding: 60px; border-radius: 20px; text-align: center; border: 1px solid #333;}
        h1 { font-size: 2.2em; margin-bottom: 40px; font-weight: 900;}
        .grid { display: flex; justify-content: center; gap: 20px; }
        .card { border: 2px solid #333; background: #1a1a1a; padding: 30px 20px; border-radius: 16px; cursor: pointer; width: 150px; transition: 0.3s;}
        .card:hover { border-color: #00CFFF; transform: translateY(-5px); }
        .card img { height: 60px; margin-bottom: 15px; object-fit: contain;}
        
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease;}
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>
    <div class="nav"><a href="index.html" class="nav-logo"><img src="5611_2.png" class="premium-logo"> NEURA STUDIO</a></div>

    <div class="box">
        <div id="step-1" class="step active">
            <h1>Select Operating System</h1>
            <div class="grid">
                <!-- REAL COLORED LOGOS -->
                <div class="card" onclick="setOS('mac')"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg" style="filter: invert(1);"><h3>macOS</h3></div>
                <div class="card" onclick="setOS('windows')"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/windows8/windows8-original.svg"><h3>Windows</h3></div>
                <div class="card" onclick="setOS('linux')"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linux/linux-original.svg"><h3>Linux</h3></div>
            </div>
        </div>
        <div id="step-2" class="step">
            <h1>Select Editor</h1>
            <div class="grid">
                <div class="card" onclick="finish()"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg"><h3>VS Code</h3></div>
                <div class="card" onclick="finish()"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/pycharm/pycharm-original.svg"><h3>PyCharm</h3></div>
            </div>
        </div>
    </div>
    <script>
        let selectedOS = '';
        function setOS(os) { selectedOS = os; document.getElementById('step-1').classList.remove('active'); document.getElementById('step-2').classList.add('active'); }
        function finish() {
            let ext = (selectedOS == 'windows') ? '.exe' : (selectedOS == 'mac' ? '.dmg' : '.sh');
            let a = document.createElement('a');
            a.href = "data:text/plain;charset=utf-8,Downloading...";
            a.download = "nova-installer" + ext;
            a.click();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
