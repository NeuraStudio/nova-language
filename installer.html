<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Installer</title>
    <style>
        body { background: #f9f9fb; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #fff; width: 750px; padding: 50px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; }
        .card { border: 2px solid #ddd; padding: 20px; border-radius: 12px; cursor: pointer; width: 140px; transition: 0.2s;}
        .card:hover { border-color: #0a84ff; background: #f4f9ff; }
        .step { display: none; }
        .step.active { display: block; }
        .btn { background: #0a84ff; color: #fff; padding: 15px 30px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 20px;}
    </style>
</head>
<body>
    <div class="box">
        <div id="step-1" class="step active">
            <h1>Select OS</h1>
            <div class="grid">
                <div class="card" onclick="setOS('mac')"><h3>macOS</h3></div>
                <div class="card" onclick="setOS('windows')"><h3>Windows</h3></div>
                <div class="card" onclick="setOS('linux')"><h3>Linux</h3></div>
            </div>
        </div>
        <div id="step-2" class="step">
            <h1>Select Editor</h1>
            <div class="grid">
                <div class="card" onclick="finish('vscode')"><h3>VS Code</h3></div>
                <div class="card" onclick="finish('pycharm')"><h3>PyCharm</h3></div>
                <div class="card" onclick="finish('terminal')"><h3>Terminal</h3></div>
            </div>
        </div>
    </div>
    <script>
        let selectedOS = '';
        function setOS(os) { selectedOS = os; document.getElementById('step-1').classList.remove('active'); document.getElementById('step-2').classList.add('active'); }
        function finish(ide) { 
            let ext = (selectedOS == 'windows') ? '.exe' : (selectedOS == 'mac' ? '.dmg' : '.sh');
            let a = document.createElement('a');
            a.href = "data:text/plain;charset=utf-8,Installer_Data";
            a.download = "nova-installer" + ext;
            a.click();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
