<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Native Console</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'SF Mono', 'Courier New', monospace; margin: 0; padding: 20px;}
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 20px;}
        .header h1 { margin: 0; color: #00CFFF; font-size: 22px; font-weight: 900;}
        .btn-run { background: #00CFFF; color: #000; padding: 10px 24px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-run:hover { transform: scale(1.05); }
        .editor-split { display: flex; gap: 20px; height: 80vh;}
        
        textarea { width: 50%; background: #111; color: #a3e635; padding: 25px; border: 1px solid #333; border-radius: 12px; font-family: inherit; font-size: 16px; outline: none; resize: none; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);}
        .output { width: 50%; background: #000; color: #fff; padding: 25px; border: 1px solid #222; border-radius: 12px; overflow-y: auto;}
    </style>
</head>
<body>
    <div class="header">
        <h1>Nova Native Console</h1>
        <div>
            <a href="index.html" style="color:#aaa; margin-right:20px; text-decoration:none;">⬅ Home</a>
            <button class="btn-run" onclick="executeNova()">Execute Native</button>
        </div>
    </div>
    <div class="editor-split">
<textarea id="code-input" spellcheck="false">
// Neura Studio - Nova Engine V1
Nova.os.kernel_bypass(true)
Nova.hardware.cpu.alloc(16, "exclusive")

Nova.show("Apex Performance Activated.")
</textarea>
        <div id="output" class="output">Engine idle... Ready for execution.</div>
    </div>

    <script>
        function executeNova() {
            let code = document.getElementById('code-input').value;
            let out = document.getElementById('output');
            out.innerHTML = "<span style='color:#00CFFF;'>[System] Compiling via NeuraVM...</span><br><br>";
            
            setTimeout(() => {
                let lines = code.split('\n');
                lines.forEach((line) => {
                    line = line.trim();
                    if(line.includes('Nova.show(')) {
                        let match = line.match(/\((.*?)\)/);
                        if(match) out.innerHTML += `<strong style="color:#fff;">> ${match[1].replace(/['"]/g, '')}</strong><br>`;
                    } else if(line.includes('Nova.')) {
                        out.innerHTML += `<span style="color:#666;">> ${line} [Executed in 0.01ms]</span><br>`;
                    }
                });
            }, 300); // 300ms premium delay simulation
        }
    </script>
</body>
</html>
