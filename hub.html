<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Hub - Live Global Registry</title>
    <style>
        body { background: #fafafa; color: #111; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 50px;}
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); position: sticky; top:0; z-index:100; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .nav-logo { display: flex; align-items: center; font-weight: 900; font-size: 22px; color: #111; text-decoration: none; }
        .hub-logo { width: 45px; height: 45px; border-radius: 12px; background: #00CFFF; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 12px; box-shadow: 0 5px 15px rgba(0,207,255,0.4); }
        .nav-links a { text-decoration: none; color: #555; font-weight: 600; margin: 0 15px; }

        .header { text-align: center; padding: 60px 20px 30px; }
        .header h1 { font-size: 3.5em; margin: 0 0 10px; color: #111; }
        
        .search-box { display: flex; max-width: 600px; margin: 0 auto 50px; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 2px solid #00CFFF; background: #fff; }
        .search-box input { flex: 1; padding: 18px 25px; border: none; font-size: 16px; outline: none; font-weight: bold; }
        .search-box button { background: #00CFFF; color: #fff; padding: 0 35px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; transition: 0.3s;}
        .search-box button:hover { background: #0099ff; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .card { background: #fff; border: 1px solid #eaeaea; padding: 30px 20px; border-radius: 16px; text-align: center; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .card:hover { border-color: #00CFFF; transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,207,255,0.15); }
        .card img { height: 60px; margin-bottom: 15px; object-fit: contain; }
        .card h3 { margin: 0 0 5px; color: #111; font-size: 1.2em; }
        .card p { font-size: 13px; color: #666; height: 35px; overflow: hidden; }
        .cmd { background: #0d1117; color: #00CFFF; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px; margin-top: 15px; word-break: break-all;}
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="nav-logo"><div class="hub-logo">📦</div> NEURA STUDIO</a>
        <div class="nav-links"><a href="index.html">Overview</a><a href="hub.html" style="color:#00CFFF;">Nova Hub</a><a href="nova_console.html">Nova Console</a></div>
    </nav>
    
    <div class="header">
        <h1>Nova Hub Live</h1>
        <p style="color:#666; font-size:1.2em;">Auto-Searching millions of real packages worldwide.</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search any package (e.g., react, pandas, tensorflow)...">
        <button onclick="searchAPI()">Search Global API</button>
    </div>

    <div class="grid" id="results">
        <h3 style="grid-column: 1/-1; text-align:center; color:#888;">Type a package name to search the real database...</h3>
    </div>

    <script>
        async function searchAPI() {
            let query = document.getElementById('searchInput').value.trim();
            let resDiv = document.getElementById('results');
            if(query.length < 2) return;
            
            resDiv.innerHTML = '<h3 style="grid-column: 1/-1; text-align:center;">📡 Fetching live data from Global Registry...</h3>';
            
            try {
                // Real NPM Registry Fetch
                let res = await fetch(`https://registry.npmjs.org/-/v1/search?text=${query}&size=12`);
                let data = await res.json();
                
                resDiv.innerHTML = '';
                if(data.objects.length === 0) {
                    resDiv.innerHTML = '<h3 style="grid-column: 1/-1; text-align:center; color:red;">No packages found!</h3>';
                    return;
                }
                
                data.objects.forEach(obj => {
                    let p = obj.package;
                    // Auto-detect logo (Fallback to 3D Box)
                    let logo = `https://cdn.jsdelivr.net/gh/devicons/devicon/icons/${p.name.split('-')[0]}/${p.name.split('-')[0]}-original.svg`;
                    
                    resDiv.innerHTML += `
                    <div class="card">
                        <img src="${logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3233/3233508.png'">
                        <h3>${p.name}</h3>
                        <p>${p.description ? p.description.substring(0, 60) + '...' : 'Native Nova Module'}</p>
                        <div class="cmd">Nova.hub.install("nova:${p.name}")</div>
                    </div>`;
                });
            } catch(e) {
                resDiv.innerHTML = '<h3 style="grid-column: 1/-1; text-align:center; color:red;">Network Error!</h3>';
            }
        }
    </script>
</body>
</html>
