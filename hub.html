<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nova Hub</title>
    <style>
        .pkg-card { padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin: 10px; display: inline-block; width: 250px; }
        .copy-btn { background: #238636; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .copy-btn.copied { background: #1f6feb; }
    </style>
</head>
<body>
    <div class="pkg-card">
        <h3>python:pandas</h3>
        <div class="code-container">
            <code id="cmd-0">Nova.import("python:pandas")</code>
            <button class="copy-btn" id="btn-0" onclick="copyCode('cmd-0', 'btn-0')">Copy</button>
        </div>
    </div>
    <script>
        function copyCode(id, btnId) {
            let text = document.getElementById(id).innerText;
            let btn = document.getElementById(btnId);
            navigator.clipboard.writeText(text);
            btn.innerText = "Copied! ✔";
            btn.classList.add("copied");
            setTimeout(() => { btn.innerText = "Copy"; btn.classList.remove("copied"); }, 2000);
        }
    </script>
</body>
</html>
